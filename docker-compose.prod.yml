# Production stack — Homify
# Usage: cp Backend_homify/.env.example Backend_homify/.env  (éditer SECRET_KEY, domaines)
#        docker compose -f docker-compose.prod.yml up -d --build

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: rental_db
      POSTGRES_USER: rental_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rental_password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rental_user -d rental_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: ./Backend_homify
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             python manage.py seed_billing_products &&
             gunicorn rental_project.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"
    volumes:
      - media_volume:/app/media
    environment:
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DATABASE_URL: postgresql://rental_user:${POSTGRES_PASSWORD:-rental_password}@db:5432/rental_db
      REDIS_URL: redis://redis:6379/0
      CELERY_TASK_ALWAYS_EAGER: "False"
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      BACKEND_PUBLIC_URL: ${BACKEND_PUBLIC_URL:-http://localhost}
      SERVE_MEDIA: "True"
      BILLING_MOCK_PAYMENTS: ${BILLING_MOCK_PAYMENTS:-False}
      AANGARAAPAY_APP_KEY: ${AANGARAAPAY_APP_KEY:-}
      AANGARAAPAY_API_BASE_URL: ${AANGARAAPAY_API_BASE_URL:-https://api-production.aangaraa-pay.com}
      AANGARAAPAY_CHECKOUT_BASE_URL: ${AANGARAAPAY_CHECKOUT_BASE_URL:-https://aangaraa-pay.com}
      BILLING_PAYMENT_POLL_INTERVAL_SECONDS: ${BILLING_PAYMENT_POLL_INTERVAL_SECONDS:-5}
      BILLING_PAYMENT_POLL_TIMEOUT_SECONDS: ${BILLING_PAYMENT_POLL_TIMEOUT_SECONDS:-60}
      HOMIFY_FREE_PLAN_MAX_LISTINGS: ${HOMIFY_FREE_PLAN_MAX_LISTINGS:-2}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"

  celery:
    build: ./Backend_homify
    restart: unless-stopped
    command: celery -A rental_project worker -l info
    volumes:
      - media_volume:/app/media
    environment:
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DATABASE_URL: postgresql://rental_user:${POSTGRES_PASSWORD:-rental_password}@db:5432/rental_db
      REDIS_URL: redis://redis:6379/0
      CELERY_TASK_ALWAYS_EAGER: "False"
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      BACKEND_PUBLIC_URL: ${BACKEND_PUBLIC_URL:-http://localhost}
      BILLING_MOCK_PAYMENTS: ${BILLING_MOCK_PAYMENTS:-False}
      AANGARAAPAY_APP_KEY: ${AANGARAAPAY_APP_KEY:-}
      AANGARAAPAY_API_BASE_URL: ${AANGARAAPAY_API_BASE_URL:-https://api-production.aangaraa-pay.com}
      AANGARAAPAY_CHECKOUT_BASE_URL: ${AANGARAAPAY_CHECKOUT_BASE_URL:-https://aangaraa-pay.com}
      BILLING_PAYMENT_POLL_INTERVAL_SECONDS: ${BILLING_PAYMENT_POLL_INTERVAL_SECONDS:-5}
      BILLING_PAYMENT_POLL_TIMEOUT_SECONDS: ${BILLING_PAYMENT_POLL_TIMEOUT_SECONDS:-60}
      HOMIFY_FREE_PLAN_MAX_LISTINGS: ${HOMIFY_FREE_PLAN_MAX_LISTINGS:-2}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./Frontend_homify
      args:
        VITE_API_BASE_URL: /api
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - web

volumes:
  postgres_data:
  media_volume:
