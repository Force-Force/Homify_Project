name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend_homify
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: Backend_homify/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Migrate
        run: python manage.py migrate --noinput
        env:
          DJANGO_SETTINGS_MODULE: rental_project.settings

      - name: Run tests
        run: python manage.py test apps.core.tests apps.notifications.tests --verbosity=2
        env:
          DJANGO_SETTINGS_MODULE: rental_project.settings

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend_homify
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: Frontend_homify/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: http://localhost:8000/api
